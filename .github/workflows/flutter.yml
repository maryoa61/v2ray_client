name: Flutter CI

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          flutter pub get
          if [ -d "packages/v2ray_dan" ]; then
            cd packages/v2ray_dan
            flutter pub get
            cd ../..
          fi
      - name: Download native libraries
        run: |
          BASE="https://github.com/maryoa61/v2ray_client/releases/download"
          JNI_DIR="packages/v2ray_dan/android/src/main/jniLibs"
          LIBS_DIR="packages/v2ray_dan/android/libs"

          mkdir -p "$JNI_DIR/arm64-v8a" "$JNI_DIR/armeabi-v7a" "$JNI_DIR/x86" "$JNI_DIR/x86_64" "$LIBS_DIR"

          # arm64-v8a
          curl -fL "$BASE/native-libs-v1/libv2jni-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libv2jni.so"
          curl -fL "$BASE/native-libs-v1/libtun2socks-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libtun2socks.so"

          # armeabi-v7a
          curl -fL "$BASE/native-libs-v2/libv2jni-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libv2jni.so"
          curl -fL "$BASE/native-libs-v2/libtun2socks-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libtun2socks.so"

          # x86
          curl -fL "$BASE/native-libs-v3/libv2jni-x86.so" -o "$JNI_DIR/x86/libv2jni.so"
          curl -fL "$BASE/native-libs-v3/libtun2socks-x86.so" -o "$JNI_DIR/x86/libtun2socks.so"

          # x86_64
          curl -fL "$BASE/native-libs-v4/libv2jni-x86_64.so" -o "$JNI_DIR/x86_64/libv2jni.so"
          curl -fL "$BASE/native-libs-v4/libtun2socks-x86_64.so" -o "$JNI_DIR/x86_64/libtun2socks.so"

          # jar
          curl -fL "$BASE/libv2ray-classes.jar/libv2ray-classes.jar" -o "$LIBS_DIR/libv2ray-classes.jar"
      - name: Analyze project
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Run tests
        run: flutter test

  build-debug-apk:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          flutter pub get
          if [ -d "packages/v2ray_dan" ]; then
            cd packages/v2ray_dan
            flutter pub get
            cd ../..
          fi
      - name: Download native libraries
        run: |
          BASE="https://github.com/maryoa61/v2ray_client/releases/download"
          JNI_DIR="packages/v2ray_dan/android/src/main/jniLibs"
          LIBS_DIR="packages/v2ray_dan/android/libs"

          mkdir -p "$JNI_DIR/arm64-v8a" "$JNI_DIR/armeabi-v7a" "$JNI_DIR/x86" "$JNI_DIR/x86_64" "$LIBS_DIR"

          # arm64-v8a
          curl -fL "$BASE/native-libs-v1/libv2jni-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libv2jni.so"
          curl -fL "$BASE/native-libs-v1/libtun2socks-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libtun2socks.so"

          # armeabi-v7a
          curl -fL "$BASE/native-libs-v2/libv2jni-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libv2jni.so"
          curl -fL "$BASE/native-libs-v2/libtun2socks-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libtun2socks.so"

          # x86
          curl -fL "$BASE/native-libs-v3/libv2jni-x86.so" -o "$JNI_DIR/x86/libv2jni.so"
          curl -fL "$BASE/native-libs-v3/libtun2socks-x86.so" -o "$JNI_DIR/x86/libtun2socks.so"

          # x86_64
          curl -fL "$BASE/native-libs-v4/libv2jni-x86_64.so" -o "$JNI_DIR/x86_64/libv2jni.so"
          curl -fL "$BASE/native-libs-v4/libtun2socks-x86_64.so" -o "$JNI_DIR/x86_64/libtun2socks.so"

          # jar
          curl -fL "$BASE/libv2ray-classes.jar/libv2ray-classes.jar" -o "$LIBS_DIR/libv2ray-classes.jar"
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release-apk:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          flutter pub get
          if [ -d "packages/v2ray_dan" ]; then
            cd packages/v2ray_dan
            flutter pub get
            cd ../..
          fi
      - name: Download native libraries
        run: |
          BASE="https://github.com/maryoa61/v2ray_client/releases/download"
          JNI_DIR="packages/v2ray_dan/android/src/main/jniLibs"
          LIBS_DIR="packages/v2ray_dan/android/libs"

          mkdir -p "$JNI_DIR/arm64-v8a" "$JNI_DIR/armeabi-v7a" "$JNI_DIR/x86" "$JNI_DIR/x86_64" "$LIBS_DIR"

          # arm64-v8a
          curl -fL "$BASE/native-libs-v1/libv2jni-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libv2jni.so"
          curl -fL "$BASE/native-libs-v1/libtun2socks-arm64-v8a.so" -o "$JNI_DIR/arm64-v8a/libtun2socks.so"

          # armeabi-v7a
          curl -fL "$BASE/native-libs-v2/libv2jni-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libv2jni.so"
          curl -fL "$BASE/native-libs-v2/libtun2socks-armeabi-v7a.so" -o "$JNI_DIR/armeabi-v7a/libtun2socks.so"

          # x86
          curl -fL "$BASE/native-libs-v3/libv2jni-x86.so" -o "$JNI_DIR/x86/libv2jni.so"
          curl -fL "$BASE/native-libs-v3/libtun2socks-x86.so" -o "$JNI_DIR/x86/libtun2socks.so"

          # x86_64
          curl -fL "$BASE/native-libs-v4/libv2jni-x86_64.so" -o "$JNI_DIR/x86_64/libv2jni.so"
          curl -fL "$BASE/native-libs-v4/libtun2socks-x86_64.so" -o "$JNI_DIR/x86_64/libtun2socks.so"

          # jar
          curl -fL "$BASE/libv2ray-classes.jar/libv2ray-classes.jar" -o "$LIBS_DIR/libv2ray-classes.jar"
      # NOTE: No real keystore exists yet. Whether this produces an
      # installable APK depends on android/app/build.gradle:
      #   - If signingConfigs.release still points at signingConfigs.debug
      #     (Flutter's default template), this just works and the APK
      #     is installable.
      #   - If it references env vars for a real keystore (common in
      #     copied templates), this step will fail until those secrets
      #     exist. If that happens, send me android/app/build.gradle.
      - name: Build release APK
        run: flutter build apk --release
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
